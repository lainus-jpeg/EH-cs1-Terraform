name: Terraform Apply

on:
  push:
    branches:
      - main
    paths:
      - '**.tf'
      - 'terraform.tfvars'
      - '**.sh'
      - '.github/workflows/terraform-*.yml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  TERRAFORM_VERSION: 1.5.0
  WORKING_DIR: .

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan
        working-directory: ${{ env.WORKING_DIR }}
        continue-on-error: true

      - name: Terraform Apply
        id: apply
        if: steps.plan.outcome == 'success'
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.WORKING_DIR }}
        continue-on-error: true

      - name: Get Outputs
        if: steps.apply.outcome == 'success'
        id: outputs
        run: |
          terraform output -json > outputs.json 2>/dev/null || echo '{}' > outputs.json
          echo "Outputs saved:"
          cat outputs.json
        working-directory: ${{ env.WORKING_DIR }}
        continue-on-error: true

      - name: Create Action Summary
        if: always()
        run: |
          echo "## Terraform Apply Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Status" >> $GITHUB_STEP_SUMMARY
          echo "- Plan: ${{ steps.plan.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Apply: ${{ steps.apply.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f outputs.json ]; then
            echo "### Key Outputs" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
            cat outputs.json >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload State Backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state
          path: ${{ env.WORKING_DIR }}/terraform.tfstate
          retention-days: 30
